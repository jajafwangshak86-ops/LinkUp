name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run build

  check-contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        run: |
          curl -fsSL https://github.com/hirosystems/clarinet/releases/latest/download/clarinet-linux-x64-glibc.tar.gz \
            -o /tmp/clarinet.tar.gz
          tar -xzf /tmp/clarinet.tar.gz -C /tmp
          sudo mv /tmp/clarinet /usr/local/bin/clarinet

      - name: Check Clarity contracts
        run: clarinet check
